# ============================================================================
# Anycubic ACE Pro — Example Klipper MCU configuration
# ============================================================================
#
# ⚠️  WARNING — UNVERIFIED / WORK IN PROGRESS
#
# This configuration is derived from staring at the ACE Pro firmware and hardware and extreme guesswork.
# It has not been fully verified or tested.
# Pin assignments may be WRONG, INCOMPLETE, or INACCURATE. Occasionally some entries could be correct though.
#
# DO NOT use this as-is without verifying each pin with a multimeter or
# oscilloscope on your actual hardware. Incorrect pin assignments can
# damage your board or connected components.
#
# This file is a STARTING POINT for development, not a working config.
#
# See ACE_PINMAP.md for the full pin map and confidence levels.
# ============================================================================

# ----------------------------------------------------------------------------
# MCU definition
# ----------------------------------------------------------------------------
[mcu ace]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_CHANGEME-if00
# Find yours with: ls /dev/serial/by-id/usb-Klipper_*

# ----------------------------------------------------------------------------
# Steppers — 4 filament slots
# ----------------------------------------------------------------------------
# Slots 0 and 2 share STEP/DIR lines; slots 1 and 3 share theirs.
# The actual multiplexing/selection mechanism is not yet fully understood.

[manual_stepper ace_slot0]
step_pin: ace:PC9
dir_pin: ace:PB12
enable_pin: ace:PB13
#microsteps: 16          # unknown — verify
#rotation_distance: 1    # unknown — calibrate

[manual_stepper ace_slot1]
step_pin: ace:PA8
dir_pin: ace:PC6
enable_pin: ace:PB13
#microsteps: 16
#rotation_distance: 1

# Slots 2 and 3 use the same STEP/DIR as 0 and 1 respectively.
# Selection between 0/2 and 1/3 likely uses the switch pins below.
# This needs further investigation.
#
# Slot switch/select pins (active state unknown):
#   Slot 0: PB3
#   Slot 1: PD2
#   Slot 2: PB5
#   Slot 3: PB4

# ----------------------------------------------------------------------------
# Fan — Dryer
# ----------------------------------------------------------------------------
# PA6 and PA7 are timer-based PWM outputs for the dryer fan.
# Which one is speed control vs direction/enable is not confirmed.

#[fan_generic ace_dryer_fan]
#pin: ace:PA6
#max_power: 1.0
#shutdown_speed: 0

# ----------------------------------------------------------------------------
# Temperature sensing
# ----------------------------------------------------------------------------
# PTC heater sense on PA15 (digital input — not an analog thermistor).
# Actual ADC channel for NTC temperature reading is not yet identified.

#[temperature_sensor ace_dryer]
#sensor_type: NTC 100K beta 3950    # unknown — placeholder
#sensor_pin: ace:???                 # ADC pin not yet identified
#min_temp: 0
#max_temp: 100

# ----------------------------------------------------------------------------
# Heater output
# ----------------------------------------------------------------------------
# The PTC heater drive pin was not directly identified in the firmware.
# It is controlled through the dryer PID state machine.

#[heater_generic ace_dryer_heater]
#heater_pin: ace:???                 # not yet identified
#sensor_type: NTC 100K beta 3950
#sensor_pin: ace:???
#control: pid
#pid_Kp: 1
#pid_Ki: 1
#pid_Kd: 1
#min_temp: 0
#max_temp: 80

# ----------------------------------------------------------------------------
# NFC — not directly supported by Klipper
# ----------------------------------------------------------------------------
# The ACE Pro has two MFRC522 NFC readers connected via USART + SPI bit-bang.
# Klipper does not have native NFC/RFID support. A custom module would be
# needed to read filament spool tags.
#
# Reader 0 (slots 0,1): USART0 (PA9/PA10)
# Reader 1 (slots 2,3): USART1 (PA2/PA3)
# SPI bit-bang: CLK=PB13, MOSI=PB15, MISO=PB14
