# ============================================================================
# Anycubic ACE Pro — Example Klipper MCU configuration
# ============================================================================
#
# WARNING
#
# This file is still reverse-engineered and not safe to use blindly.
# It reflects the current firmware model:
# one selector motor rotates the slot-selection clutch/gear mechanism, and one
# separate motor performs filament feed / retract. The ACE does not appear to
# have one dedicated feed motor per slot.
#
# See ACE_PINMAP.md for the current confirmed/likely/unknown mapping details.
# ============================================================================

# ----------------------------------------------------------------------------
# MCU definition
# ----------------------------------------------------------------------------
[mcu ace]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_CHANGEME-if00
# Find yours with: ls /dev/serial/by-id/usb-Klipper_*

# ----------------------------------------------------------------------------
# Physical motors
# ----------------------------------------------------------------------------
# Confirmed from firmware:
#   Selector motor: STEP=PD2, DIR=PB3
#   Feed/retract motor: STEP=PB4, DIR=PB5
#
# The stock firmware first aligns the selector motor to a slot, then runs the
# separate feed motor. The exact clutch linkage is still not modeled for
# Klipper, so the entries below are only useful for low-level bring-up tests.

[manual_stepper ace_selector_motor]
step_pin: ace:PD2
dir_pin: ace:PB3
#enable_pin: ace:PA1      # shared control line, polarity/function still unclear
#microsteps: 16
#rotation_distance: 1

[manual_stepper ace_feed_motor]
step_pin: ace:PB4
dir_pin: ace:PB5
#enable_pin: ace:PA1
#microsteps: 16
#rotation_distance: 1

# Shared control / likely driver lines seen during motor bring-up:
#   PA1  = common control line (enable/reset, polarity unknown)
#   PC1, PC2, PC3, PB0, PB1 = additional driver-control outputs (role unresolved)

# ----------------------------------------------------------------------------
# Slot presence inputs
# ----------------------------------------------------------------------------
# These are directly sampled by the stock firmware as the per-slot "input" pins.
# Active polarity is not fully verified, so the sections stay commented out.
#
# Slot 0: PA4
# Slot 1: PA5
# Slot 2: PC4
# Slot 3: PC5

#[filament_switch_sensor ace_slot0_present]
#switch_pin: ace:PA4
#pause_on_runout: False

#[filament_switch_sensor ace_slot1_present]
#switch_pin: ace:PA5
#pause_on_runout: False

#[filament_switch_sensor ace_slot2_present]
#switch_pin: ace:PC4
#pause_on_runout: False

#[filament_switch_sensor ace_slot3_present]
#switch_pin: ace:PC5
#pause_on_runout: False

# Additional confirmed slot diagnostics:
#   Slot 0 hall1: PC13
#   Slot 1 hall1: PC14
#   Slot 2 hall1: PC15
#   Slot 3 hall1: PC0
#   Shared hall2: PB8

# ----------------------------------------------------------------------------
# Fans / PWM / LED
# ----------------------------------------------------------------------------
# Dryer fan PWM is confirmed on PA6 + PA7 using the GD32F303 TIMER2 peripheral
# at base 0x40000400. The datasheet AF table matches this exactly:
#   PA6 = TIMER2_CH0
#   PA7 = TIMER2_CH1
# The stock firmware drives both channels with the same duty cycle.

#[fan_generic ace_dryer_fan_pa6]
#pin: ace:PA6
#max_power: 1.0
#shutdown_speed: 0

#[fan_generic ace_dryer_fan_pa7]
#pin: ace:PA7
#max_power: 1.0
#shutdown_speed: 0

# Auxiliary PWM output on PA0 uses TIMER1_CH0 at base 0x40000000.
# The exact external function is likely a second fan or auxiliary output.

#[fan_generic ace_aux_pwm]
#pin: ace:PA0
#max_power: 1.0
#shutdown_speed: 0

# Per-slot indicator LEDs:
#   Slot 0: PB10
#   Slot 1: PB11
#   Slot 2: PA14
#   Slot 3: PA13
# The firmware drives these as individual outputs and as a 4-bit group.
# The observed pattern suggests active-low LED wiring.

#[output_pin ace_status_led]
#pin: ace:PB7
#value: 0
#shutdown_value: 0

# ----------------------------------------------------------------------------
# Temperature / heater path
# ----------------------------------------------------------------------------
# Confirmed:
#   PA15 = digital PTC status input
#   PA15 + PC10 participate in the stock temperature/sensor bit-bang path
#
# Not yet safe to express as a Klipper thermistor/heater config:
# the stock firmware temperature path is more complex than a single confirmed
# ADC thermistor pin, so the heater/sensor entries remain intentionally omitted.

# ----------------------------------------------------------------------------
# NFC / RFID wiring reference
# ----------------------------------------------------------------------------
# Reader 0 (slots 0/1): USART0 on PA9/PA10
# Reader 1 (slots 2/3): USART1 on PA2/PA3
# These pairings are also the default datasheet USART pin assignments.
#
# Per-slot NFC GPIO bundle:
#   Slot 0: RST=PC9 IRQ=PC7 CS=PB12
#   Slot 1: RST=PA8 IRQ=PC8 CS=PC6
#   Slot 2: RST=PC9 IRQ=PC7 CS=PB12
#   Slot 3: RST=PA8 IRQ=PC8 CS=PC6
#
# Shared NFC bit-bang lines:
#   CLK  = PB13
#   MOSI = PB15
#   MISO = PB14
#   PA1  = common control line (shared, exact polarity/function unclear)
#
# Klipper does not natively support this ACE RFID/NFC subsystem.
